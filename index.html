<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPL Predictor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f7;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .match-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        button {
            background: #2481cc;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ EPL Predictor</h1>
        
        <div id="status">
            <p>Testing connection...</p>
        </div>
        
        <div id="matches"></div>
    </div>

    <script type="module">
        // Show we're loading
        document.getElementById('status').innerHTML = '<p>🔄 Loading...</p>';
        
        try {
            // Import Firebase
            const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
            const { getFirestore, collection, getDocs } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
            
            // YOUR FIREBASE CONFIG - REPLACE WITH YOURS
            const firebaseConfig = {
                apiKey: "AIzaSy...",  // ← REPLACE THIS
                authDomain: "epl-predictor.firebaseapp.com",  // ← REPLACE THIS
                projectId: "epl-predictor",  // ← REPLACE THIS
                storageBucket: "epl-predictor.appspot.com",
                messagingSenderId: "123456789",
                appId: "1:123456789:web:abc123"
            };
            
            // Initialize
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            
            document.getElementById('status').innerHTML = '<div class="success">✅ Firebase connected!</div>';
            
            // Try to load matches
            const matchesRef = collection(db, 'matches');
            const snapshot = await getDocs(matchesRef);
            
            document.getElementById('status').innerHTML += `<div class="success">✅ Found ${snapshot.size} matches in database!</div>`;
            
            // Display matches
            const matchesDiv = document.getElementById('matches');
            
            if (snapshot.empty) {
                matchesDiv.innerHTML = '<div class="error">⚠️ No matches found in database</div>';
            } else {
                snapshot.forEach(doc => {
                    const match = doc.data();
                    const card = document.createElement('div');
                    card.className = 'match-card';
                    card.innerHTML = `
                        <div class="teams">
                            <span>${match.homeTeam}</span>
                            <span>VS</span>
                            <span>${match.awayTeam}</span>
                        </div>
                        <div>Gameweek: ${match.gameweek}</div>
                        <div>Status: ${match.status}</div>
                    `;
                    matchesDiv.appendChild(card);
                });
            }
            
        } catch (error) {
            document.getElementById('status').innerHTML = `
                <div class="error">
                    ❌ Error: ${error.message}<br><br>
                    <strong>Most likely causes:</strong><br>
                    1. Firebase config is wrong<br>
                    2. Firestore rules block access<br>
                    3. Network connection issue<br><br>
                    Open in desktop browser and press F12 for details
                </div>
            `;
            console.error('Full error:', error);
        }
    </script>
</body>
</html>
