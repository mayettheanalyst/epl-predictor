<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EPL Predictor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f2f2f7;
            padding: 20px;
        }
        .header {
            background: #2481cc;
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .match-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
        }
        .info {
            font-size: 13px;
            color: #666;
            display: flex;
            justify-content: space-between;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .loading { text-align: center; padding: 40px; color: white; }
        .nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
        }
        .nav button {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
        }
        .nav button.active {
            background: white;
            color: #2481cc;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚽ EPL Predictor</h1>
        <div id="status">Initializing...</div>
    </div>
    
    <div class="nav">
        <button class="active" onclick="showPage('matches')">Matches</button>
        <button onclick="showPage('leaderboard')">Leaderboard</button>
        <button onclick="showPage('profile')">Profile</button>
        <button onclick="showPage('admin')">Admin</button>
    </div>
    
    <div id="matches-page">
        <h2 style="text-align:center;margin-bottom:15px;">Gameweek 31</h2>
        <div id="matches-container"></div>
    </div>
    
    <div id="leaderboard-page" style="display:none;">
        <h2>🏆 Leaderboard</h2>
        <p>Coming soon...</p>
    </div>
    
    <div id="profile-page" style="display:none;">
        <h2>👤 Profile</h2>
        <p>Coming soon...</p>
    </div>
    
    <div id="admin-page" style="display:none;">
        <h2>⚙️ Admin</h2>
        <p>Coming soon...</p>
    </div>

    <script type="module">
        // Show we're starting
        document.getElementById('status').innerHTML = '🔄 Connecting to Firebase...';
        
        try {
            // Import Firebase
            const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
            const { getFirestore, collection, getDocs } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
            
            // ⚠️ REPLACE WITH YOUR FIREBASE CONFIG
            const firebaseConfig = {
                apiKey: "AIzaSyAaqYXuYEg_pIPMHfbz7i1jcVCgeGJ_4zs",
                authDomain: "epl-predictor-ae53f.firebaseapp.com",
                projectId: "epl-predictor-ae53f",
                storageBucket: "epl-predictor-ae53f.firebasestorage.app",
                messagingSenderId: "956744043344",
                appId: "1:956744043344:web:79a7bdedc55d14eec43a55"
            };
            
            // Initialize
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            
            document.getElementById('status').innerHTML = '✅ Connected! Loading matches...';
            
            // Load ALL matches (no filters)
            const matchesRef = collection(db, 'matches');
            const snapshot = await getDocs(matchesRef);
            
            const container = document.getElementById('matches-container');
            
            if (snapshot.empty) {
                container.innerHTML = `
                    <div class="error">
                        ⚠️ No matches found in database<br><br>
                        <strong>Add matches:</strong><br>
                        1. Go to Admin tab<br>
                        2. Login with password<br>
                        3. Add your fixtures
                    </div>
                `;
            } else {
                document.getElementById('status').innerHTML = `✅ Found ${snapshot.size} match(es)`;
                
                snapshot.forEach(doc => {
                    const match = doc.data();
                    
                    const card = document.createElement('div');
                    card.className = 'match-card';
                    
                    let dateStr = 'TBD';
                    if (match.kickoffTime) {
                        try {
                            const d = match.kickoffTime.toDate 
                                ? match.kickoffTime.toDate() 
                                : new Date(match.kickoffTime);
                            dateStr = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                        } catch(e) {
                            dateStr = 'Invalid date';
                        }
                    }
                    
                    card.innerHTML = `
                        <div class="teams">
                            <span>${match.homeTeam || 'Home'}</span>
                            <span>VS</span>
                            <span>${match.awayTeam || 'Away'}</span>
                        </div>
                        <div class="info">
                            <span>📅 ${dateStr}</span>
                            <span>🏆 GW${match.gameweek || '?'}</span>
                        </div>
                        <div class="info" style="margin-top:5px;">
                            <span>📍 ${match.stadium || 'TBD'}</span>
                            <span>${match.status || 'scheduled'}</span>
                        </div>
                    `;
                    
                    container.appendChild(card);
                });
            }
            
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('status').innerHTML = `
                <div class="error" style="text-align:left;">
                    ❌ Error: ${error.message}<br><br>
                    <strong>Common fixes:</strong><br>
                    1. Check Firebase config is correct<br>
                    2. Check Firestore rules allow read<br>
                    3. Open in desktop browser & press F12
                </div>
            `;
        }
        
        // Simple page navigation
        window.showPage = function(pageName) {
            ['matches', 'leaderboard', 'profile', 'admin'].forEach(p => {
                document.getElementById(p + '-page').style.display = p === pageName ? 'block' : 'none';
            });
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        };
    </script>
</body>
</html>
